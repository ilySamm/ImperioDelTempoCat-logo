<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imperio del Tempo — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #b5924c; --gold-light: #d4b07a;
      --dark: #0e0d0b; --dark2: #1a1916; --dark3: #252420;
      --text: #e8e4dc; --muted: #8a8580;
      --border: rgba(181,146,76,0.25);
    }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    /* HEADER */
    header { text-align: center; padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); position: relative; }
    header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .logo-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
    .logo-wrap img { height: 120px; width: 200px; filter: brightness(0) invert(1); opacity: 0.9; }
    .tagline { margin-top: 0.4rem; font-size: 0.75rem; letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase; }

    /* FILTERS */
    .filters { display: flex; justify-content: center; gap: 0.5rem; padding: 2rem 1rem; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 1.2rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold-light); background: rgba(181,146,76,0.08); }

    /* GRID */
    .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; max-width: 1200px; margin: 0 auto; padding: 0 1rem 4rem; }

    /* CARD */
    .watch-card { background: var(--dark2); position: relative; cursor: pointer; transition: transform 0.3s ease; overflow: hidden; }
    .watch-card:hover { transform: translateY(-4px); }
    .watch-card:hover .card-overlay { opacity: 1; }

    .card-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--dark3); }

    /* CARRUSEL */
    .carousel { position: relative; width: 100%; height: 100%; }
    .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease; }
    .carousel-slide { min-width: 100%; height: 100%; flex-shrink: 0; overflow: hidden; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
    .watch-card:hover .carousel-slide img { transform: scale(1.04); }

    .carousel-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(14,13,11,0.65); border: 1px solid var(--border);
      color: var(--gold-light); width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; z-index: 5;
      transition: background 0.2s; user-select: none; line-height: 1;
    }
    .carousel-arrow:hover { background: rgba(181,146,76,0.3); }
    .carousel-arrow.prev { left: 8px; }
    .carousel-arrow.next { right: 8px; }

    .carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(232,228,220,0.35); cursor: pointer; transition: background 0.2s; }
    .carousel-dot.active { background: var(--gold-light); }

    /* Placeholder sin fotos */
    .img-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .img-placeholder svg { opacity: 0.3; width: 56px; height: 56px; }

    .card-overlay { position: absolute; inset: 0; background: rgba(14,13,11,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
    .overlay-btn { background: var(--gold); color: #0e0d0b; border: none; padding: 0.65rem 1.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; font-weight: 500; }

    .stock-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(14,13,11,0.85); border: 1px solid var(--border); color: var(--gold-light); font-size: 0.7rem; letter-spacing: 0.08em; padding: 0.25rem 0.6rem; text-transform: uppercase; z-index: 4; }
    .stock-badge.agotado { color: #c0392b; border-color: rgba(192,57,43,0.4); }
    .stock-badge.poco    { color: #e67e22; border-color: rgba(230,126,34,0.3); }

    /* CARD INFO */
    .card-info { padding: 1.2rem 1.2rem 1.4rem; border-top: 1px solid var(--border); }
    .watch-category { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
    .watch-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 0.25rem; }
    .watch-ref { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .watch-price { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--gold-light); font-weight: 400; }

    .wa-btn-card { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid rgba(37,211,102,0.4); color: #25d366; padding: 0.35rem 0.85rem; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; transition: all 0.2s; }
    .wa-btn-card:hover { background: rgba(37,211,102,0.1); border-color: #25d366; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(10,9,8,0.92); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 1rem; }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--dark2); border: 1px solid var(--border); max-width: 820px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
    @media (max-width: 600px) { .modal { grid-template-columns: 1fr; } }

    /* Carrusel del modal */
    .modal-carousel { position: relative; aspect-ratio: 1; background: var(--dark3); overflow: hidden; }
    .modal-carousel .carousel-track { height: 100%; }
    .modal-carousel .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .modal-carousel .carousel-arrow { width: 34px; height: 34px; font-size: 1.1rem; }

    .modal-body { padding: 2rem 1.8rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-category { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
    .modal-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; line-height: 1.15; }
    .modal-ref { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
    .modal-desc { font-size: 0.88rem; line-height: 1.7; color: #b0aca4; border-top: 1px solid var(--border); padding-top: 1rem; }
    .modal-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; border-top: 1px solid var(--border); padding-top: 1rem; }
    .detail-item label { display: block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .detail-item span { font-size: 0.9rem; color: var(--text); }
    .modal-price { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold-light); }

    .wa-btn-modal { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25d366; color: #0e0d0b; border: none; padding: 0.85rem 1.5rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .wa-btn-modal:hover { background: #1ebe5d; }

    .close-btn { position: absolute; top: 1rem; right: 1rem; background: transparent; border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 10; }
    .close-btn:hover { border-color: var(--gold); color: var(--gold); }

    footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
  </style>
</head>

// ══════════════════════════════════════════════
const WA_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

const catalog = document.getElementById('catalog');
const modalBg  = document.getElementById('modalBg');
const closeBtn = document.getElementById('closeBtn');

function waLink(r) {
  const msg = encodeURIComponent(`¡Hola! Me interesa el Reloj ${r.nombre} — ${r.precio}. ¿Está disponible?`);
  return `https://wa.me/${WA_NUMBER}?text=${msg}`;
}

function stockLabel(qty) {
  if (qty === 0) return { label: 'Agotado', cls: 'agotado' };
  if (qty <= 2)  return { label: 'Últimas unidades', cls: 'poco' };
  return { label: 'Disponible', cls: '' };
}

function buildCarousel(fotos, nombre, container) {
  if (!fotos || fotos.length === 0) {
    container.innerHTML = `<div class="img-placeholder">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="32" cy="32" r="22"/><circle cx="32" cy="32" r="16"/>
        <line x1="32" y1="10" x2="32" y2="6"/><line x1="32" y1="58" x2="32" y2="54"/>
        <line x1="10" y1="32" x2="6" y2="32"/><line x1="58" y1="32" x2="54" y2="32"/>
        <line x1="32" y1="32" x2="32" y2="22"/><line x1="32" y1="32" x2="40" y2="36"/>
      </svg>
      Agrega tus fotos
    </div>`;
    return;
  }

  let current = 0;

  const slides = fotos.map(url => `<div class="carousel-slide"><img src="${url}" alt="${nombre}" loading="lazy"/></div>`).join('');
  const dots   = fotos.length > 1 ? `<div class="carousel-dots">${fotos.map((_, i) => `<div class="carousel-dot${i===0?' active':''}"></div>`).join('')}</div>` : '';
  const arrows = fotos.length > 1 ? `<button class="carousel-arrow prev">&#8249;</button><button class="carousel-arrow next">&#8250;</button>` : '';

  container.innerHTML = `<div class="carousel"><div class="carousel-track">${slides}</div>${dots}${arrows}</div>`;

  if (fotos.length <= 1) return;

  const track    = container.querySelector('.carousel-track');
  const dotEls   = container.querySelectorAll('.carousel-dot');
  const prevBtn  = container.querySelector('.prev');
  const nextBtn  = container.querySelector('.next');

  function goTo(n) {
    current = (n + fotos.length) % fotos.length;
    track.style.transform = `translateX(-${current * 100}%)`;
    dotEls.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  prevBtn.addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });
  nextBtn.addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });
  dotEls.forEach((d, i) => d.addEventListener('click', e => { e.stopPropagation(); goTo(i); }));
}

function renderCards(lista) {
  catalog.innerHTML = '';
  lista.forEach(r => {
    const { label, cls } = stockLabel(r.cantidad);
    const card = document.createElement('article');
    card.className = 'watch-card';
    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="carousel-container" style="width:100%;height:100%;"></div>
        <div class="stock-badge ${cls}">${label}</div>
        <div class="card-overlay"><button class="overlay-btn">Ver detalle</button></div>
      </div>
      <div class="card-info">
        <div class="watch-category">${r.categoria}</div>
        <div class="watch-name">${r.nombre}</div>
        <div class="watch-ref">${r.referencia}</div>
        <div class="card-footer">
          <div class="watch-price">${r.precio}</div>
          <a class="wa-btn-card" href="${waLink(r)}" target="_blank" onclick="event.stopPropagation()">
            ${WA_SVG} WhatsApp
          </a>
        </div>
      </div>`;

    buildCarousel(r.fotos, r.nombre, card.querySelector('.carousel-container'));
    card.addEventListener('click', () => openModal(r));
    catalog.appendChild(card);
  });
}

function openModal(r) {
  const { label } = stockLabel(r.cantidad);
  buildCarousel(r.fotos, r.nombre, document.getElementById('modalCarousel'));
  document.getElementById('modalCat').textContent   = r.categoria;
  document.getElementById('modalName').textContent  = r.nombre;
  document.getElementById('modalRef').textContent   = r.referencia;
  document.getElementById('modalDesc').textContent  = r.descripcion;
  document.getElementById('modalMov').textContent   = r.movimiento;
  document.getElementById('modalCaja').textContent  = r.caja;
  document.getElementById('modalDiam').textContent  = r.diametro;
  document.getElementById('modalDisp').textContent  = label;
  document.getElementById('modalPrice').textContent = r.precio;
  document.getElementById('modalWaBtn').href        = waLink(r);
  modalBg.classList.add('open');
}

closeBtn.addEventListener('click', () => modalBg.classList.remove('open'));
modalBg.addEventListener('click', e => { if (e.target === modalBg) modalBg.classList.remove('open'); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.cat;
    renderCards(f === 'todos' ? relojes : relojes.filter(r => r.categoria === f));
  });
});

renderCards(relojes);
</script>
</body>
</html>
